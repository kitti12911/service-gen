{{- $autoscaling := .Values.autoscaling | default dict }}
{{- $resources := .Values.resources | default dict }}
{{- $limits := $resources.limits | default dict }}
{{- $gomemlimit := .Values.gomemlimit | default dict }}
{{- $gomemlimitEnabled := $gomemlimit.enabled | default false }}
{{- $memoryLimit := $limits.memory | default "" }}
apiVersion: apps/v1
kind: Deployment
metadata:
    name: {{ .Release.Name }}
    labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
{{- if .Values.reloader.enabled }}
    annotations:
        reloader.stakater.com/auto: "true"
{{- end }}
spec:
{{- if not $autoscaling.enabled }}
    replicas: {{ .Values.replicaCount }}
{{- end }}
    selector:
        matchLabels:
            app.kubernetes.io/name: {{ .Chart.Name }}
            app.kubernetes.io/instance: {{ .Release.Name }}
    template:
        metadata:
            labels:
                app.kubernetes.io/name: {{ .Chart.Name }}
                app.kubernetes.io/instance: {{ .Release.Name }}
        spec:
{{- with .Values.podSecurityContext }}
            securityContext:
{{ toYaml . | indent 16 }}
{{- end }}
{{- with .Values.imagePullSecrets }}
            imagePullSecrets:
{{ toYaml . | indent 16 }}
{{- end }}
{{- with .Values.affinity }}
            affinity:
{{ toYaml . | indent 16 }}
{{- end }}
{{- with .Values.topologySpreadConstraints }}
            topologySpreadConstraints:
{{ toYaml . | indent 16 }}
{{- end }}
            containers:
                - name: {{ .Chart.Name }}
{{- if .Values.image.digest }}
                  image: "{{ .Values.image.repository }}@{{ .Values.image.digest }}"
{{- else if .Values.image.tag }}
                  image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
{{- else }}
{{- fail "image.tag or image.digest is required" }}
{{- end }}
                  imagePullPolicy: {{ .Values.image.pullPolicy }}
{{- if or .Values.env (and $gomemlimitEnabled $memoryLimit) }}
                  env:
{{- if and $gomemlimitEnabled $memoryLimit }}
                      - name: GOMEMLIMIT
                        value: "{{ include "___NAME___.gomemlimit" (dict "memory" $memoryLimit "percentage" $gomemlimit.percentage) }}"
{{- end }}
{{- with .Values.env }}
{{ toYaml . | indent 22 }}
{{- end }}
{{- end }}
{{- with .Values.securityContext }}
                  securityContext:
{{ toYaml . | indent 22 }}
{{- end }}
                  ports:
                      - name: http
                        containerPort: {{ .Values.config.service.port }}
                        protocol: TCP
{{- if .Values.probes.readiness.enabled }}
                  readinessProbe:
                      httpGet:
                          path: {{ .Values.probes.readiness.path }}
                          port: http
                      initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
                      periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
                      timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
                      failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
{{- end }}
{{- if .Values.probes.liveness.enabled }}
                  livenessProbe:
                      httpGet:
                          path: {{ .Values.probes.liveness.path }}
                          port: http
                      initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
                      periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
                      timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
                      failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
{{- end }}
                  volumeMounts:
                      - name: config
                        mountPath: /app/config.yml
                        subPath: config.yml
                        readOnly: true
{{- with $resources }}
                  resources:
{{ toYaml . | indent 22 }}
{{- end }}
            volumes:
                - name: config
                  secret:
{{- if .Values.configSecret.name }}
                      secretName: {{ .Values.configSecret.name }}
{{- else if .Values.configSecret.create }}
                      secretName: {{ .Release.Name }}-config
{{- else }}
{{- fail "configSecret.name is required when configSecret.create is false" }}
{{- end }}
