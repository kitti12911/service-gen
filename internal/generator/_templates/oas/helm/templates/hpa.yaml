{{- $autoscaling := .Values.autoscaling | default dict }}
{{- if $autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
    name: {{ .Release.Name }}
    labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/managed-by: {{ .Release.Service }}
        helm.sh/chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
    scaleTargetRef:
        apiVersion: apps/v1
        kind: Deployment
        name: {{ .Release.Name }}
    minReplicas: {{ .Values.replicaCount }}
    maxReplicas: {{ required "autoscaling.maxReplicas is required when autoscaling.enabled is true" $autoscaling.maxReplicas }}
    metrics:
        - type: Resource
          resource:
              name: cpu
              target:
                  type: Utilization
                  averageUtilization: {{ required "autoscaling.targetCPUUtilizationPercentage is required when autoscaling.enabled is true" $autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
