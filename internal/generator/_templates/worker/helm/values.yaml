replicaCount: 1

image:
    repository: ghcr.io/kitti12911/___NAME___
    tag: ""
    digest: ""
    pullPolicy: IfNotPresent

imagePullSecrets: []

env: []

gomemlimit:
    enabled: true
    percentage: 80

reloader:
    enabled: true

podSecurityContext: {}

securityContext:
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: true
    capabilities:
        drop:
            - ALL
    seccompProfile:
        type: RuntimeDefault

resources: {}

affinity: {}

topologySpreadConstraints: []

configSecret:
    create: true
    name: ""

config:
    service:
        name: ___NAME___
        shutdown_timeout: 10s

    logging:
        level: info
        add_source: false
        include_trace_id: true

    tracing:
        enabled: true
        endpoint: alloy.observability.svc.cluster.local:4317
        protocol: grpc
        insecure: true
        sample_ratio: 0.1

    profiling:
        enabled: true
        server_address: http://pyroscope.observability.svc.cluster.local:4040
        namespace: ___NAME___
        basic_auth_user: ""
        basic_auth_password: ""
        tenant_id: ""

    nats:
        url: nats://nats.database.svc.cluster.local:4222
        username: example_user
        password: example_password
        queue_group_prefix: ___NAME___
        subscribers_count: 1
        close_timeout: 30s
        ack_wait_timeout: 30s
        subscribe_timeout: 30s
        jetstream:
            enabled: true
            auto_provision: true
            track_msg_id: true
            ack_async: false
            durable_prefix: ___NAME___

    worker:
        topic: ___NAME___-jobs
