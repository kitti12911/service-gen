name: Go CI

on:
    push:
        branches:
            - develop
            - uat
            - main
        paths:
            - "release.config.cjs"
            - ".github/workflows/go-ci.yml"
            - ".github/workflows/release.yml"
            - ".golangci.yml"
            - "Dockerfile"
            - "Makefile"
            - "buf.gen.yaml"
            - "config.example.yml"
            - "go.mod"
            - "go.sum"
            - "scripts/ci/**"
            - "**/*.go"
            - "**/*.sql"
            - "**/*.yml"
            - "**/*.yaml"
            - "!README.md"
    pull_request:
        paths:
            - "release.config.cjs"
            - ".github/workflows/go-ci.yml"
            - ".github/workflows/release.yml"
            - ".golangci.yml"
            - "Dockerfile"
            - "Makefile"
            - "buf.gen.yaml"
            - "config.example.yml"
            - "go.mod"
            - "go.sum"
            - "scripts/ci/**"
            - "**/*.go"
            - "**/*.sql"
            - "**/*.yml"
            - "**/*.yaml"
            - "!README.md"

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    generate:
        name: Generate
        runs-on: ubuntu-latest
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            # actions/setup-go v6.4.0
            - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
              with:
                  go-version-file: go.mod

            # actions/cache v6.1.0
            - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
              id: gobin-codegen
              with:
                  path: ~/go/bin
                  key: ${{ runner.os }}-gobin-codegen-${{ hashFiles('.github/workflows/go-ci.yml') }}

            - name: Install codegen tools
              if: steps.gobin-codegen.outputs.cache-hit != 'true'
              run: |
                  go install github.com/bufbuild/buf/cmd/buf@v1.71.0
                  go install google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
                  go install google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.2

            - name: Generate code
              run: ./scripts/ci/generate-code.sh

            # actions/upload-artifact v7.0.1
            - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
              with:
                  name: generated-code
                  path: |
                      gen/

    lint:
        name: Lint
        runs-on: ubuntu-latest
        needs:
            - generate
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            # actions/setup-go v6.4.0
            - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
              with:
                  go-version-file: go.mod

            # actions/download-artifact v8.0.1
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
              with:
                  name: generated-code
                  path: gen

            # golangci/golangci-lint-action v9.2.0
            - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
              with:
                  version: v2.12.2

    test:
        name: Test
        runs-on: ubuntu-latest
        needs:
            - generate
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            # actions/setup-go v6.4.0
            - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
              with:
                  go-version-file: go.mod

            # actions/download-artifact v8.0.1
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
              with:
                  name: generated-code
                  path: gen

            - name: Test with coverage
              run: ./scripts/ci/go-test.sh
              env:
                  # PRs skip the race detector for speed; pushes (develop/uat/main)
                  # keep the full CGO+race run as the release gate.
                  GO_TEST_RACE: ${{ github.event_name == 'push' && 'true' || 'false' }}
                  # Keep in sync with GO_COVERAGE_EXCLUDE_REGEX in the Makefile
                  # so local `make cov` and CI report the same %.
                  GO_COVERAGE_EXCLUDE_REGEX: "/cmd/|/internal/database/|/handler\\.go:|/query\\.go:|/repository\\.go:|/internal/server/grpc\\.go:"

            - name: Show coverage
              run: |
                  coverage_total="$(go tool cover -func=coverage.out | tail -n 1)"
                  echo "${coverage_total}"
                  {
                      echo "## Go coverage"
                      echo
                      echo '```text'
                      echo "${coverage_total}"
                      echo '```'
                  } >> "${GITHUB_STEP_SUMMARY}"

    toolchain-security:
        name: Toolchain Security
        runs-on: ubuntu-latest
        needs:
            - generate
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0

            # actions/setup-go v6.4.0
            - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
              with:
                  go-version-file: go.mod

            # actions/setup-python v6.3.0
            - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
              with:
                  python-version: "3.13"
                  cache: "pip"
                  cache-dependency-path: .github/workflows/go-ci.yml

            # actions/download-artifact v8.0.1
            - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
              with:
                  name: generated-code
                  path: gen

            # actions/cache v6.1.0
            - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
              id: gobin-security
              with:
                  path: ~/go/bin
                  key: ${{ runner.os }}-gobin-security-${{ hashFiles('.github/workflows/go-ci.yml') }}

            # govulncheck-action is a composite with tag-pinned internals the org
            # SHA-pin policy rejects; install directly.
            - name: Install govulncheck
              if: steps.gobin-security.outputs.cache-hit != 'true'
              run: go install golang.org/x/vuln/cmd/govulncheck@v1.5.0

            - name: Install Semgrep
              run: pip install --quiet semgrep==1.168.0

            - name: govulncheck and Semgrep
              run: ./scripts/ci/security-scan.sh

    security:
        name: Supply Chain Security
        runs-on: ubuntu-latest
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0

            # aquasecurity/trivy-action v0.36.0
            - name: Trivy filesystem scan
              uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
              with:
                  scan-type: fs
                  scan-ref: .
                  scanners: vuln,secret,misconfig
                  severity: CRITICAL,HIGH
                  ignore-unfixed: true
                  exit-code: 1
              env:
                  TRIVY_DB_REPOSITORY: mirror.gcr.io/aquasec/trivy-db,ghcr.io/aquasecurity/trivy-db

            # gitleaks/gitleaks-action v2.3.9
            - name: Gitleaks
              uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITLEAKS_ENABLE_COMMENTS: "false"
                  GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
                  GITLEAKS_ENABLE_SUMMARY: "true"

    release:
        name: Release
        needs:
            - generate
            - lint
            - test
            - toolchain-security
            - security
        if: |
            github.event_name == 'push' &&
            needs.generate.result == 'success' &&
            needs.lint.result == 'success' &&
            needs.test.result == 'success' &&
            needs.toolchain-security.result == 'success' &&
            needs.security.result == 'success'
        permissions:
            contents: write
            issues: write
            packages: write
            pull-requests: write
        uses: ./.github/workflows/release.yml
        with:
            release_branch: ${{ github.ref_name }}
            release_sha: ${{ github.sha }}
        secrets: inherit

    promotion-pr:
        name: Create Promotion PR
        runs-on: ubuntu-latest
        needs:
            - release
        if: |
            github.event_name == 'push' &&
            (github.ref_name == 'develop' || github.ref_name == 'uat')
        permissions:
            contents: read
            issues: write
            pull-requests: write
        steps:
            - name: Create or update promotion PR
              env:
                  GH_TOKEN: ${{ github.token }}
                  REPOSITORY: ${{ github.repository }}
                  SOURCE_BRANCH: ${{ github.ref_name }}
                  SOURCE_SHA: ${{ github.sha }}
                  WORKFLOW_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
              run: |
                  case "${SOURCE_BRANCH}" in
                      develop)
                          TARGET_BRANCH="uat"
                          ;;
                      uat)
                          TARGET_BRANCH="main"
                          ;;
                      *)
                          echo "No promotion target configured for ${SOURCE_BRANCH}."
                          exit 0
                          ;;
                  esac

                  compare_status="$(gh api \
                      "repos/${REPOSITORY}/compare/${TARGET_BRANCH}...${SOURCE_BRANCH}" \
                      --jq '.status')"
                  if [ "${compare_status}" = "identical" ] || [ "${compare_status}" = "behind" ]; then
                      echo "${SOURCE_BRANCH} has no new commits to promote to ${TARGET_BRANCH}."
                      exit 0
                  fi

                  title="Promote ${SOURCE_BRANCH} to ${TARGET_BRANCH}"
                  body="$(mktemp)"
                  cat > "${body}" <<EOF
                  Automated promotion PR from \`${SOURCE_BRANCH}\` to \`${TARGET_BRANCH}\`.

                  Source commit: \`${SOURCE_SHA}\`
                  Successful workflow run: ${WORKFLOW_RUN_URL}
                  EOF

                  existing_prs="$(gh pr list \
                      --repo "${REPOSITORY}" \
                      --head "${SOURCE_BRANCH}" \
                      --base "${TARGET_BRANCH}" \
                      --state open \
                      --json number,createdAt \
                      --jq 'sort_by(.createdAt) | reverse | .[].number')"

                  existing_pr="$(printf '%s\n' "${existing_prs}" | sed -n '1p')"
                  duplicate_prs="$(printf '%s\n' "${existing_prs}" | sed -n '2,$p')"

                  if [ -n "${existing_pr}" ]; then
                      gh pr edit "${existing_pr}" \
                          --repo "${REPOSITORY}" \
                          --title "${title}" \
                          --body-file "${body}"
                      echo "Updated promotion PR #${existing_pr}."
                  else
                      created_pr_url="$(gh pr create \
                          --repo "${REPOSITORY}" \
                          --head "${SOURCE_BRANCH}" \
                          --base "${TARGET_BRANCH}" \
                          --title "${title}" \
                          --body-file "${body}")"
                      existing_pr="$(gh pr view "${created_pr_url}" \
                          --repo "${REPOSITORY}" \
                          --json number \
                          --jq '.number')"
                      echo "Created promotion PR #${existing_pr}."
                  fi

                  for duplicate_pr in ${duplicate_prs}; do
                      gh pr close "${duplicate_pr}" \
                          --repo "${REPOSITORY}" \
                          --comment "Closing duplicate promotion PR; #${existing_pr} now tracks \`${SOURCE_BRANCH}\` to \`${TARGET_BRANCH}\`."
                  done

    helm-image-update:
        name: Update Helm Values
        runs-on: ubuntu-latest
        needs:
            - release
        if: |
            github.event_name == 'push' &&
            needs.release.outputs.published == 'true'
        permissions:
            contents: read
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  path: ___NAME___

            # actions/create-github-app-token v2.1.4
            - uses: actions/create-github-app-token@67018539274d69449ef7c02e8e71183d1719ab42
              id: homelab-devops-token
              with:
                  app-id: ${{ secrets.BRANCH_SYNC_APP_ID }}
                  private-key: ${{ secrets.BRANCH_SYNC_APP_PRIVATE_KEY }}
                  owner: ${{ github.repository_owner }}
                  repositories: homelab-devops

            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  repository: ${{ github.repository_owner }}/homelab-devops
                  ref: main
                  path: homelab-devops
                  token: ${{ steps.homelab-devops-token.outputs.token }}

            - name: Update environment values image
              env:
                  VALUES_FILE: homelab-devops/apps/kubernetes/app/${{ github.ref_name }}/___NAME___/values.yml
                  IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY }}
                  IMAGE_NAMESPACE: ${{ vars.IMAGE_NAMESPACE }}
                  DEPLOY_IMAGE_REGISTRY: ${{ vars.DEPLOY_IMAGE_REGISTRY }}
                  DEPLOY_IMAGE_NAMESPACE: ${{ vars.DEPLOY_IMAGE_NAMESPACE }}
                  IMAGE_NAME: ___NAME___
                  RELEASE_TAG: ${{ needs.release.outputs.git_tag }}
                  IMAGE_DIGEST: ${{ needs.release.outputs.image_digest }}
              run: ./___NAME___/scripts/ci/update-helm-image-values.sh

            - name: Commit values update
              env:
                  ENVIRONMENT: ${{ github.ref_name }}
                  RELEASE_TAG: ${{ needs.release.outputs.git_tag }}
                  GIT_WORKDIR: homelab-devops
                  GIT_ADD_PATH: apps/kubernetes/app/${{ github.ref_name }}/___NAME___/values.yml
                  GIT_COMMIT_MESSAGE: "chore(___NAME___): update ${{ github.ref_name }} image to ${{ needs.release.outputs.git_tag }}"
                  GIT_USER_NAME: homelab-image-update[bot]
                  GIT_USER_EMAIL: homelab-image-update[bot]@users.noreply.github.com
                  GIT_PUSH_REMOTE: origin
                  GIT_PUSH_REF: HEAD:main
                  GIT_REBASE_BRANCH: main
              run: ./___NAME___/scripts/ci/commit-and-push-changes.sh

    sync-down:
        name: Sync Main To Prerelease Branches
        runs-on: ubuntu-latest
        needs:
            - release
        if: |
            github.event_name == 'push' &&
            github.ref_name == 'main'
        permissions:
            contents: read
        steps:
            # actions/create-github-app-token v2.1.4
            - uses: actions/create-github-app-token@67018539274d69449ef7c02e8e71183d1719ab42
              id: branch-sync-token
              with:
                  app-id: ${{ secrets.BRANCH_SYNC_APP_ID }}
                  private-key: ${{ secrets.BRANCH_SYNC_APP_PRIVATE_KEY }}

            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0
                  token: ${{ steps.branch-sync-token.outputs.token }}

            - name: Fast-forward prerelease branches
              env:
                  REPOSITORY: ${{ github.repository }}
                  BRANCH_SYNC_TOKEN: ${{ steps.branch-sync-token.outputs.token }}
              run: ./scripts/ci/fast-forward-prerelease-branches.sh
