version: v2
inputs:
    - directory: proto
managed:
    enabled: true
    override:
        - file_option: go_package_prefix
          value: ___MODULE___/gen/grpc
plugins:
    - local: protoc-gen-go
      out: gen/grpc
      opt: paths=source_relative
    - local: protoc-gen-go-grpc
      out: gen/grpc
      opt: paths=source_relative
