name: Release

on:
    workflow_run:
        workflows:
            - Go CI
        types:
            - completed
        branches:
            - main

permissions:
    contents: write
    pull-requests: write

jobs:
    release:
        runs-on: ubuntu-latest
        if: github.event.workflow_run.conclusion == 'success'
        steps:
            # googleapis/release-please-action v5.0.0
            - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7
              with:
                  release-type: go
