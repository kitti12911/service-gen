name: Go CI

on:
    push:
        branches:
            - main
        paths:
            - ".github/workflows/go-ci.yml"
            - ".github/workflows/release.yml"
            - "CHANGELOG.md"
            - ".golangci.yml"
            - "Makefile"
            - "release.config.cjs"
            - "go.mod"
            - "go.sum"
            - "scripts/ci/**"
            - "internal/generator/_templates/**"
            - "**/*.go"
            - "!README.md"
    pull_request:
        paths:
            - ".github/workflows/go-ci.yml"
            - ".github/workflows/release.yml"
            - "CHANGELOG.md"
            - ".golangci.yml"
            - "Makefile"
            - "release.config.cjs"
            - "go.mod"
            - "go.sum"
            - "scripts/ci/**"
            - "internal/generator/_templates/**"
            - "**/*.go"
            - "!README.md"

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        container:
            image: ${{ vars.IMAGE_TOOLCHAIN_IMAGE }}
            credentials:
                username: ${{ secrets.TOOLCHAIN_REGISTRY_USERNAME }}
                password: ${{ secrets.TOOLCHAIN_REGISTRY_PASSWORD }}
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Lint Go code
              run: ./scripts/ci/go-lint.sh

    test:
        name: Test
        runs-on: ubuntu-latest
        container:
            image: ${{ vars.IMAGE_TOOLCHAIN_IMAGE }}
            credentials:
                username: ${{ secrets.TOOLCHAIN_REGISTRY_USERNAME }}
                password: ${{ secrets.TOOLCHAIN_REGISTRY_PASSWORD }}
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            - name: Test with coverage
              run: ./scripts/ci/go-test.sh
              env:
                  GO_TEST_RACE: false

            - name: Show coverage
              run: |
                  coverage_total="$(go tool cover -func=coverage.out | tail -n 1)"
                  echo "${coverage_total}"
                  {
                      echo "## Go coverage"
                      echo
                      echo '```text'
                      echo "${coverage_total}"
                      echo '```'
                  } >> "${GITHUB_STEP_SUMMARY}"

    toolchain-security:
        name: Toolchain Security
        runs-on: ubuntu-latest
        container:
            image: ${{ vars.SECURITY_TOOLCHAIN_IMAGE }}
            credentials:
                username: ${{ secrets.TOOLCHAIN_REGISTRY_USERNAME }}
                password: ${{ secrets.TOOLCHAIN_REGISTRY_PASSWORD }}
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0

            - name: govulncheck and Semgrep
              run: ./scripts/ci/security-scan.sh

    security:
        name: Supply Chain Security
        runs-on: ubuntu-latest
        container:
            image: ${{ vars.SUPPLY_CHAIN_TOOLCHAIN_IMAGE }}
            credentials:
                username: ${{ secrets.TOOLCHAIN_REGISTRY_USERNAME }}
                password: ${{ secrets.TOOLCHAIN_REGISTRY_PASSWORD }}
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0

            - name: Trivy and Gitleaks
              run: ./scripts/ci/supply-chain-scan.sh
