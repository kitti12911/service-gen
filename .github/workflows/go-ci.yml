name: Go CI

on:
    push:
        branches:
            - main
        paths:
            - ".github/workflows/go-ci.yml"
            - ".github/workflows/release.yml"
            - "CHANGELOG.md"
            - ".golangci.yml"
            - "Makefile"
            - "release.config.cjs"
            - "go.mod"
            - "go.sum"
            - "scripts/ci/**"
            - "**/*.go"
            - "internal/generator/_templates/**"
            - "!README.md"
    pull_request:
        paths:
            - ".github/workflows/go-ci.yml"
            - ".github/workflows/release.yml"
            - "CHANGELOG.md"
            - ".golangci.yml"
            - "Makefile"
            - "release.config.cjs"
            - "go.mod"
            - "go.sum"
            - "scripts/ci/**"
            - "**/*.go"
            - "internal/generator/_templates/**"
            - "!README.md"

concurrency:
    group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            # actions/setup-go v6.4.0
            - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
              with:
                  go-version-file: go.mod

            # golangci/golangci-lint-action v9.2.0
            - uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20
              with:
                  version: v2.12.2

    test:
        name: Test
        runs-on: ubuntu-latest
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

            # actions/setup-go v6.4.0
            - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
              with:
                  go-version-file: go.mod

            - name: Test with coverage
              run: ./scripts/ci/go-test.sh
              env:
                  # PRs skip the race detector for speed; pushes (develop/uat/main)
                  # keep the full CGO+race run as the release gate.
                  GO_TEST_RACE: ${{ github.event_name == 'push' && 'true' || 'false' }}

            - name: Show coverage
              run: |
                  coverage_total="$(go tool cover -func=coverage.out | tail -n 1)"
                  echo "${coverage_total}"
                  {
                      echo "## Go coverage"
                      echo
                      echo '```text'
                      echo "${coverage_total}"
                      echo '```'
                  } >> "${GITHUB_STEP_SUMMARY}"

    toolchain-security:
        name: Toolchain Security
        runs-on: ubuntu-latest
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0

            # actions/setup-go v6.4.0
            - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
              with:
                  go-version-file: go.mod

            # actions/setup-python v6.3.0
            - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
              with:
                  python-version: "3.13"
                  cache: "pip"
                  cache-dependency-path: .github/workflows/go-ci.yml

            # actions/cache v6.1.0
            - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
              id: gobin-security
              with:
                  path: ~/go/bin
                  key: ${{ runner.os }}-gobin-security-${{ hashFiles('.github/workflows/go-ci.yml') }}

            # govulncheck-action is a composite whose nested steps use tag pins,
            # which the org policy (full-SHA only) rejects — install directly.
            - name: Install govulncheck
              if: steps.gobin-security.outputs.cache-hit != 'true'
              run: go install golang.org/x/vuln/cmd/govulncheck@v1.5.0

            - name: Install Semgrep
              run: pip install --quiet semgrep==1.168.0

            - name: govulncheck and Semgrep
              run: ./scripts/ci/security-scan.sh

    security:
        name: Supply Chain Security
        runs-on: ubuntu-latest
        steps:
            # actions/checkout v6.0.2
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
              with:
                  fetch-depth: 0

            # aquasecurity/trivy-action v0.36.0
            - name: Trivy filesystem scan
              uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
              with:
                  scan-type: fs
                  scan-ref: .
                  scanners: vuln,secret,misconfig
                  severity: CRITICAL,HIGH
                  ignore-unfixed: true
                  exit-code: 1
              env:
                  TRIVY_DB_REPOSITORY: mirror.gcr.io/aquasec/trivy-db,ghcr.io/aquasecurity/trivy-db

            # gitleaks/gitleaks-action v2.3.9
            - name: Gitleaks
              uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  GITLEAKS_ENABLE_COMMENTS: "false"
                  GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
                  GITLEAKS_ENABLE_SUMMARY: "true"
