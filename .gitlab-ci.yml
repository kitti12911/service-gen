stages:
    - lint
    - test
    - security
    - release

workflow:
    rules:
        - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
        - if: '$CI_COMMIT_BRANCH == "main"'
        - when: never

variables:
    GIT_DEPTH: "0"
    GITLAB_AMD64_RUNNER_TAG: "solution-principle.gitlab-bu8-sd"
    GO_TEST_RACE: "false"

markdownlint:
    stage: lint
    image: $CI_RELEASE_TOOLCHAIN_IMAGE
    tags:
        - $GITLAB_AMD64_RUNNER_TAG
    rules:
        - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
          changes: &markdown_changes
              - ".gitlab-ci.yml"
              - ".markdownlint-cli2.*"
              - ".markdownlint.*"
              - "**/*.md"
              - "**/*.markdown"
        - if: '$CI_COMMIT_BRANCH == "main"'
          changes: *markdown_changes
    script:
        - ./scripts/ci/markdownlint.sh

lint:go:
    stage: lint
    image: $CI_IMAGE_TOOLCHAIN_IMAGE
    tags:
        - $GITLAB_AMD64_RUNNER_TAG
    rules:
        - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
          changes: &go_changes
              - ".gitlab-ci.yml"
              - ".github/workflows/go-ci.yml"
              - ".github/workflows/release.yml"
              - "CHANGELOG.md"
              - ".golangci.yml"
              - "Makefile"
              - "release.config.cjs"
              - "go.mod"
              - "go.sum"
              - "scripts/ci/**"
              - "internal/generator/_templates/**"
              - "**/*.go"
        - if: '$CI_COMMIT_BRANCH == "main"'
          changes: *go_changes
    script:
        - ./scripts/ci/go-lint.sh

test:go:
    stage: test
    image: $CI_IMAGE_TOOLCHAIN_IMAGE
    tags:
        - $GITLAB_AMD64_RUNNER_TAG
    rules:
        - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
          changes: *go_changes
        - if: '$CI_COMMIT_BRANCH == "main"'
          changes: *go_changes
    script:
        - ./scripts/ci/go-test.sh
    artifacts:
        when: always
        expire_in: 1 week
        paths:
            - coverage.out

security:toolchain:
    stage: security
    image: $CI_SECURITY_TOOLCHAIN_IMAGE
    tags:
        - $GITLAB_AMD64_RUNNER_TAG
    rules:
        - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
          changes: *go_changes
        - if: '$CI_COMMIT_BRANCH == "main"'
          changes: *go_changes
    script:
        - ./scripts/ci/security-scan.sh

security:supply-chain:
    stage: security
    image: $CI_SUPPLY_CHAIN_TOOLCHAIN_IMAGE
    tags:
        - $GITLAB_AMD64_RUNNER_TAG
    rules:
        - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
          changes: *go_changes
        - if: '$CI_COMMIT_BRANCH == "main"'
          changes: *go_changes
    script:
        - ./scripts/ci/supply-chain-scan.sh

release:publish:
    stage: release
    image: $CI_RELEASE_TOOLCHAIN_IMAGE
    tags:
        - $GITLAB_AMD64_RUNNER_TAG
    rules:
        - if: '$CI_COMMIT_BRANCH == "main"'
          changes: *go_changes
    script:
        - git fetch --tags --force
        - |
            token="${GL_TOKEN:-${GITLAB_TOKEN:-}}"
            if [ -z "${token}" ]; then
                echo "GL_TOKEN or GITLAB_TOKEN is required for GitLab semantic-release." >&2
                exit 2
            fi
            git remote set-url origin "https://oauth2:${token}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git"
        - ./scripts/ci/semantic-release-publish.sh
